services:
  - type: web
    name: woodfinder
    runtime: docker
    plan: free
    branch: master
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: true
      - key: SEARCH_KEYWORDS
        value: free firewood
      - key: MAX_SEARCH_PAGES
        value: "3"
      - key: CACHE_TTL_MINUTES
        value: "10"
      - key: NOMINATIM_USER_AGENT
        value: Woodfinder/1.0 (https://github.com/dantasticdan/woodfinder)
